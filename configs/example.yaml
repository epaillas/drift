# Example DRIFT configuration — Planck 2018-like cosmology
# z = 0.5, Gaussian smoothing R = 10 Mpc/h, 5 density-split bins

cosmology:
  h: 0.6766
  Omega_m: 0.3111
  Omega_b: 0.049
  sigma8: 0.8102
  n_s: 0.9665
  engine: class

z: 0.5
R: 10.0
kernel: gaussian

tracer_bias: 1.8

split_bins:
  - label: DS1
    bq: -1.5
    cq: 0.0
  - label: DS2
    bq: -0.5
    cq: 0.0
  - label: DS3
    bq: 0.1
    cq: 0.0
  - label: DS4
    bq: 0.8
    cq: 0.0
  - label: DS5
    bq: 1.8
    cq: 0.0
